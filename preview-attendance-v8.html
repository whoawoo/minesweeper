<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>출석 v8 — 포레스트 결 + P_T 트로피 박스</title>
  <style>
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", Tahoma, sans-serif;
      background: #2e2e2e; margin: 0; padding: 30px 12px 60px;
    }
    #scrollRoot { display: flex; flex-direction: column; gap: 56px; align-items: center; }
    .demo-label {
      color: #fff; font-weight: 700; letter-spacing: 0.06em;
      text-shadow: 1px 1px 0 #000; font-size: 0.95rem; text-align: center;
      margin-bottom: -10px;
    }
    .demo-card { width: 100%; max-width: 360px; }

    /* ====== 외곽 프레임 (포레스트 결, 보더 부드럽게) ====== */
    .v8 {
      padding: 16px;
      border-radius: 6px;
      box-shadow:
        0 0 0 1.5px var(--frame, #b08858),
        0 8px 22px rgba(40, 25, 5, 0.28);
      color: var(--ink, #3a2814);
      position: relative;
      background-color: var(--paper, #ede0c8);
      background-image:
        repeating-linear-gradient(90deg,
          var(--grain1, rgba(120, 80, 30, 0.04)) 0 2px,
          transparent 2px 14px),
        repeating-linear-gradient(0deg,
          var(--grain2, rgba(120, 80, 30, 0.025)) 0 30px,
          transparent 30px 31px);
    }
    .v8-back {
      background: var(--btn, rgba(120, 80, 30, 0.12));
      color: var(--ink, #3a2814);
      border: 1px solid var(--frame, #b08858);
      border-radius: 100px; padding: 4px 12px; font-size: 0.78rem;
      font-weight: 700; cursor: pointer;
    }

    /* ====== P_T 트로피 박스 (production 그대로) ====== */
    .pt-box {
      position: relative;
      padding: 22px 0 22px;
      min-height: 124px;
      margin: 12px 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.45), transparent 50%),
        linear-gradient(135deg, #fde68a 0%, #f59e0b 50%, #fcd34d 100%);
      color: #6b3a00;
      box-shadow:
        inset 0 0 22px rgba(255, 255, 255, 0.45),
        0 2px 8px rgba(245, 158, 11, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .pt-bg {
      position: absolute; inset: 0;
      background: radial-gradient(
        ellipse 75% 100% at 0% 100%,
        rgba(255, 255, 255, 0.78) 0%,
        rgba(255, 255, 255, 0.4) 40%,
        transparent 72%
      );
      pointer-events: none; z-index: 0;
    }
    .pt-stamp {
      position: absolute;
      top: 12px; right: 12px;
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2.5px solid #b3331f;
      background: rgba(255, 248, 224, 0.25);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Georgia, serif;
      font-size: 0.6rem; font-weight: 800;
      color: #b3331f; letter-spacing: 0.12em;
      text-align: center; line-height: 1;
      transform: rotate(-14deg);
      box-shadow: 0 2px 4px rgba(179, 51, 31, 0.25);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      z-index: 2;
    }
    .pt-stamp .num { font-size: 1.1rem; margin: 2px 0; }
    .pt-trophy {
      font-size: 3.8rem; line-height: 1;
      margin: 3px 0 0 0;
      filter: drop-shadow(0 2px 4px rgba(184, 134, 11, 0.6));
      cursor: pointer;
      user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease-out;
    }
    .pt-trophy.enlarged { transform: scale(1.3); }
    .pt-caption {
      position: absolute;
      bottom: 12px; left: 16px;
      margin: 0;
      font-family: "Times New Roman", Times, "Apple SD Gothic Neo", serif;
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: 0.05em;
      color: #6b3a00;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
      text-align: left; z-index: 2;
    }
    .pt-caption small {
      display: block; font-size: 0.65rem;
      letter-spacing: 0.2em; color: #8a5410;
      margin-top: 2px; text-transform: uppercase;
      font-weight: 600;
    }
    .pt-rule {
      position: absolute;
      left: 8px; bottom: 54px;
      width: 110px; height: 1.5px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(74, 39, 0, 0.5) 22%,
        rgba(74, 39, 0, 0.8) 50%,
        rgba(74, 39, 0, 0.5) 78%, transparent 100%);
      pointer-events: none; z-index: 1;
    }
    .pt-box::before {
      content: "✨"; position: absolute;
      top: 6px; left: 50%; margin-left: 10px;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 2px rgba(184, 134, 11, 0.4);
      animation: pt-twinkle 1.8s ease-in-out infinite;
      z-index: 3;
    }
    @keyframes pt-twinkle {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50%      { opacity: 1;   transform: scale(1.1); }
    }
    @keyframes pt-shimmer {
      0%, 100% { box-shadow: inset 0 0 18px rgba(255,255,255,0.35), 0 2px 6px rgba(245,158,11,0.3); }
      50%      { box-shadow: inset 0 0 32px rgba(255,255,255,0.65), 0 4px 14px rgba(245,158,11,0.55); }
    }
    .pt-box { animation: pt-shimmer 2.4s ease-in-out infinite; }

    /* 체리 전용: 하트 모양 클립으로 P_T 박스를 잘라냄 */
    .v8.cherry .pt-heart-wrap {
      position: relative;
      width: 100%; aspect-ratio: 1.05 / 1;
      margin: 12px 0;
    }
    .v8.cherry .pt-heart-wrap .pt-box {
      position: absolute; inset: 0; margin: 0;
      clip-path: path("M 160 280 C 60 220 0 150 0 90 C 0 40 40 0 90 0 C 130 0 160 30 175 60 C 190 30 220 0 260 0 C 310 0 350 40 350 90 C 350 150 290 220 190 280 Z");
    }

    /* 미드나잇 전용: 동그란 구멍으로 P_T 박스 잘라냄 (달처럼) */
    .v8.midnight .pt-circle-wrap {
      position: relative;
      width: 100%; aspect-ratio: 1 / 1;
      margin: 12px 0;
    }
    .v8.midnight .pt-circle-wrap .pt-box {
      position: absolute; inset: 0; margin: 0;
      clip-path: circle(50%);
    }

    /* ====== 월 라벨 + 캘린더 ====== */
    .v8-month {
      font-size: 0.85rem; letter-spacing: 0.06em;
      color: var(--ink-mute, #6a4a20);
      text-align: center; margin-bottom: 8px; font-weight: 700;
    }
    .v8-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .v8-wk {
      text-align: center; font-size: 0.65rem; padding: 3px 0;
      color: var(--ink-mute, #6a4a20); font-weight: 700; letter-spacing: 0.08em;
    }
    .v8-wk.sun { color: var(--sun, #b03220); }
    .v8-wk.sat { color: var(--sat, #4a6a20); }
    .v8-day {
      aspect-ratio: 1; background: var(--cell, rgba(120, 80, 30, 0.08));
      border: none; font-family: inherit; font-weight: 700; font-size: 0.85rem;
      color: var(--ink, #3a2814); cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .v8-day.stamped::after {
      content: ""; position: absolute; inset: 14%;
      border: 2.4px solid #c93026; border-radius: 50%;
    }
    .v8-day.stamped { color: #b02016; }
    .v8.midnight-tone .v8-day.stamped::after {
      border-color: #ff5a4a;
      box-shadow: 0 0 6px rgba(255, 90, 74, 0.45);
    }
    .v8.midnight-tone .v8-day.stamped { color: #ff8a78; }

    /* ===== 테마별 색상 변수 ===== */
    .v8.forest {
      --frame: #b08858;
      --ink: #3a2814; --ink-mute: #6a4a20;
      --paper: #ede0c8;
      --btn: rgba(120, 80, 30, 0.12);
      --cell: rgba(120, 80, 30, 0.08);
      --grain1: rgba(120, 80, 30, 0.04);
      --grain2: rgba(120, 80, 30, 0.025);
      --sun: #b03220; --sat: #4a6a20;
    }
    .v8.lavender {
      --frame: #b098c8;
      --ink: #3a1f5c; --ink-mute: #7858a0;
      --paper: #ece0f0;
      --btn: rgba(120, 80, 180, 0.12);
      --cell: rgba(120, 80, 180, 0.1);
      --grain1: rgba(80, 40, 110, 0.04);
      --grain2: rgba(80, 40, 110, 0.025);
      --sun: #b04488; --sat: #4860b0;
    }
    .v8.ocean {
      --frame: #88a8c0;
      --ink: #0e2848; --ink-mute: #4878a0;
      --paper: #d8e8ec;
      --btn: rgba(40, 90, 140, 0.14);
      --cell: rgba(40, 90, 140, 0.1);
      --grain1: rgba(20, 50, 90, 0.04);
      --grain2: rgba(20, 50, 90, 0.025);
      --sun: #b04050; --sat: #1e4a78;
    }
    .v8.cherry {
      --frame: #d4a0b0;
      --ink: #5a1830; --ink-mute: #9a4870;
      --paper: #f4dde4;
      --btn: rgba(180, 80, 130, 0.12);
      --cell: rgba(180, 80, 130, 0.1);
      --grain1: rgba(140, 40, 70, 0.045);
      --grain2: rgba(140, 40, 70, 0.025);
      --sun: #c0286c; --sat: #6048b0;
    }
    .v8.midnight {
      --frame: rgba(245, 233, 192, 0.4);
      --ink: #f0eef8; --ink-mute: rgba(245, 233, 192, 0.6);
      --paper: #181830;
      --btn: rgba(245, 233, 192, 0.14);
      --cell: rgba(255, 255, 255, 0.06);
      --grain1: rgba(255, 255, 255, 0.025);
      --grain2: rgba(245, 233, 192, 0.02);
      --sun: #ee8898; --sat: #98b8ff;
    }
    .v8.midnight .v8-back { background: var(--btn); color: #f5e9c0; }
  </style>
</head>
<body>
<div id="scrollRoot"></div>

<script>
  const FIRST_DOW = 3, LAST = 30;
  const STAMPED_ALL = Array.from({length:30}, (_, i) => i+1);

  function buildGrid(rootEl) {
    const wks = ["일","월","화","수","목","금","토"];
    wks.forEach((n, i) => {
      const h = document.createElement("div");
      h.className = "v8-wk" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
      h.textContent = n;
      rootEl.appendChild(h);
    });
    for (let i = 0; i < FIRST_DOW; i++) rootEl.appendChild(document.createElement("div"));
    for (let d = 1; d <= LAST; d++) {
      const c = document.createElement("button");
      c.className = "v8-day";
      c.type = "button";
      c.textContent = d;
      if (STAMPED_ALL.includes(d)) c.classList.add("stamped");
      rootEl.appendChild(c);
    }
  }

  const PT_BOX_HTML = `
    <div class="pt-box">
      <span class="pt-bg" aria-hidden="true"></span>
      <span class="pt-rule" aria-hidden="true"></span>
      <span class="pt-stamp">
        <span>perfect</span>
        <span class="num">30</span>
        <span>days</span>
      </span>
      <span class="pt-trophy" data-sound="dragon">🏆</span>
      <span class="pt-caption">4월 CLEAR<small>April 2026</small></span>
    </div>`;

  const THEMES = [
    { key: "forest",   name: "포레스트" },
    { key: "lavender", name: "라벤더" },
    { key: "ocean",    name: "오션" },
    { key: "cherry",   name: "체리" },
    { key: "midnight", name: "미드나잇" },
  ];

  const root = document.getElementById("scrollRoot");
  THEMES.forEach((t, i) => {
    const wrap = document.createElement("div");
    wrap.className = "demo-card";
    let trophyArea = PT_BOX_HTML;
    if (t.key === "cherry")   trophyArea = `<div class="pt-heart-wrap">${PT_BOX_HTML}</div>`;
    if (t.key === "midnight") trophyArea = `<div class="pt-circle-wrap">${PT_BOX_HTML}</div>`;
    wrap.innerHTML = `
      <div class="demo-label">${i+1}️⃣  ${t.name}</div>
      <div class="v8 ${t.key} ${t.key === 'midnight' ? 'midnight-tone' : ''}">
        <button class="v8-back">‹ 메뉴</button>
        ${trophyArea}
        <div class="v8-month">2026년 4월</div>
        <div class="v8-grid"></div>
      </div>`;
    root.appendChild(wrap);
    buildGrid(wrap.querySelector(".v8-grid"));
  });

  // 트로피 인터랙션
  document.querySelectorAll(".pt-trophy").forEach((t) => {
    let timer;
    const onTap = (e) => {
      e.preventDefault();
      t.classList.add("enlarged");
      const a = new Audio(`./sounds/${t.dataset.sound}.mp3`);
      a.play().catch(() => {});
      a.onended = () => t.classList.remove("enlarged");
      clearTimeout(timer);
      timer = setTimeout(() => t.classList.remove("enlarged"), 4000);
    };
    t.addEventListener("click", onTap);
    t.addEventListener("touchstart", onTap, { passive: false });
  });
</script>
</body>
</html>
