<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지금 푸시된 트로피 페이지 (4월 달성)</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 스크롤 풀기 (production은 fixed) */
    html, body {
      position: static !important; inset: auto !important;
      height: auto !important; min-height: 100vh !important;
      overflow: visible !important; overflow-y: auto !important;
    }
  </style>
</head>
<body>
<div id="scrollRoot">

  <div id="attendanceView" class="view">
    <button class="back-btn">← 메뉴</button>
    <div class="cal-frame">
      <div class="cal-header">
        <button class="cal-nav">◀</button>
        <span class="cal-month-label">2026년 4월</span>
        <button class="cal-nav">▶</button>
      </div>
      <div class="cal-trophy-row earned" id="trophyRow"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="cal-hint">날짜를 선택하세요 (없으면 오늘)</div>
    <button class="big-btn">계속하기 ▶</button>
  </div>

</div>

<script>
  const FIRST_DOW = 3, LAST = 30;

  // 트로피 영역 (production P_T 디자인 그대로) — 4월 달성
  document.getElementById("trophyRow").innerHTML =
    `<span class="cal-trophy-bg" aria-hidden="true"></span>` +
    `<span class="cal-trophy-stamp">` +
      `<span>perfect</span><span class="num">30</span><span>days</span>` +
    `</span>` +
    `<span class="cal-trophy-emoji" id="trophyEmoji">🏆</span>` +
    `<span class="cal-trophy-caption">4월 CLEAR<small>April 2026</small></span>`;

  // 달력 — 30일 모두 도장
  const grid = document.getElementById("calGrid");
  const wks = ["일","월","화","수","목","금","토"];
  wks.forEach((n, i) => {
    const h = document.createElement("div");
    h.className = "cal-wkhead" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
    h.textContent = n;
    grid.appendChild(h);
  });
  for (let i = 0; i < FIRST_DOW; i++) {
    const b = document.createElement("div");
    b.className = "cal-blank";
    grid.appendChild(b);
  }
  for (let d = 1; d <= LAST; d++) {
    const c = document.createElement("button");
    c.className = "cal-day stamped";
    c.type = "button";
    c.textContent = d;
    grid.appendChild(c);
  }

  // 트로피 클릭 → dragon 사운드 + 1.3x
  const trophy = document.getElementById("trophyEmoji");
  let timer;
  const onTap = (e) => {
    e.preventDefault();
    trophy.classList.add("enlarged");
    const a = new Audio(`./sounds/dragon.mp3`);
    a.play().catch(() => {});
    a.onended = () => trophy.classList.remove("enlarged");
    clearTimeout(timer);
    timer = setTimeout(() => trophy.classList.remove("enlarged"), 4000);
  };
  trophy.addEventListener("click", onTap);
  trophy.addEventListener("touchstart", onTap, { passive: false });
</script>
</body>
</html>
