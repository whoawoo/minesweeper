<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6d6d6d" />
  <title>지뢰찾기</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
  <link rel="stylesheet" href="style.css?v=62" />
</head>
<body>
  <!-- 모든 콘텐츠를 감싸는 스크롤 루트 (body 대신 여기서 스크롤 → pull-to-refresh 차단) -->
  <div id="scrollRoot">

  <!-- 메인 화면: 다이얼로그 창 -->
  <div id="mainView" class="view">
    <div class="dialog-window">
      <div class="dialog-titlebar">
        <span class="dialog-title">
          <svg class="title-bomb" viewBox="0 0 512 512" aria-hidden="true">
            <circle cx="256" cy="256" r="100" fill="#fff"/>
            <g stroke="#fff" stroke-width="22" stroke-linecap="round">
              <line x1="256" y1="176" x2="256" y2="100"/>
              <line x1="256" y1="336" x2="256" y2="412"/>
              <line x1="176" y1="256" x2="100" y2="256"/>
              <line x1="336" y1="256" x2="412" y2="256"/>
              <line x1="199" y1="199" x2="146" y2="146"/>
              <line x1="313" y1="313" x2="366" y2="366"/>
              <line x1="199" y1="313" x2="146" y2="366"/>
              <line x1="313" y1="199" x2="366" y2="146"/>
            </g>
          </svg>
          <span>지뢰찾기</span>
          <svg class="title-bomb" viewBox="0 0 512 512" aria-hidden="true">
            <circle cx="256" cy="256" r="100" fill="#fff"/>
            <g stroke="#fff" stroke-width="22" stroke-linecap="round">
              <line x1="256" y1="176" x2="256" y2="100"/>
              <line x1="256" y1="336" x2="256" y2="412"/>
              <line x1="176" y1="256" x2="100" y2="256"/>
              <line x1="336" y1="256" x2="412" y2="256"/>
              <line x1="199" y1="199" x2="146" y2="146"/>
              <line x1="313" y1="313" x2="366" y2="366"/>
              <line x1="199" y1="313" x2="146" y2="366"/>
              <line x1="313" y1="199" x2="366" y2="146"/>
            </g>
          </svg>
        </span>
      </div>

      <div class="dialog-body">
        <button id="attendanceBtn" class="attendance-card" type="button">
          <span class="att-icon-wrap" aria-hidden="true"><span class="att-icon">📅</span></span>
          <span class="att-title-line">출석체크</span>
          <span class="att-led" id="attendanceInfo">000</span>
        </button>

        <div class="menu">
          <button id="resumeBtn" class="menu-btn resume-btn hidden">
            <span class="menu-name">▶ 이어하기</span>
            <span class="menu-info" id="resumeInfo"></span>
          </button>
          <button class="menu-btn" data-level="beginner">
            <span class="menu-name">초보</span>
            <span class="menu-info">8 × 8 · 지뢰 17개</span>
          </button>
          <button class="menu-btn" data-level="intermediate">
            <span class="menu-name">중수</span>
            <span class="menu-info">16 × 16 · 지뢰 54개</span>
          </button>
          <button class="menu-btn" data-level="expert">
            <span class="menu-name">고수</span>
            <span class="menu-info">16 × 30 · 지뢰 103개</span>
          </button>
        </div>

        <button class="settings-btn" type="button" id="openSettings">
          <svg class="settings-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 00.12-.64l-1.92-3.32a.5.5 0 00-.61-.22l-2.39.96a7.03 7.03 0 00-1.62-.94l-.36-2.54a.5.5 0 00-.5-.42h-3.84a.5.5 0 00-.5.42l-.36 2.54c-.59.24-1.13.55-1.62.94l-2.39-.96a.5.5 0 00-.61.22L2.66 8.78a.5.5 0 00.12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 00-.12.64l1.92 3.32a.5.5 0 00.61.22l2.39-.96c.49.39 1.03.7 1.62.94l.36 2.54a.5.5 0 00.5.42h3.84a.5.5 0 00.5-.42l.36-2.54c.59-.24 1.13-.55 1.62-.94l2.39.96a.5.5 0 00.61-.22l1.92-3.32a.5.5 0 00-.12-.64l-2.03-1.58zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z"/>
          </svg>
          <span>설정</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-backdrop hidden" id="settingsModal">
    <div class="modal-window">
      <div class="dialog-titlebar"><span class="dialog-title">설정</span></div>
      <div class="dialog-body">
        <div class="setting-section">
          <p class="setting-label">테마</p>
          <div class="theme-grid">
            <button class="theme-item active" data-theme="classic">
              <span class="theme-swatch swatch-classic"></span><span>클래식</span>
            </button>
            <button class="theme-item" data-theme="forest">
              <span class="theme-swatch swatch-forest"></span><span>포레스트</span>
            </button>
            <button class="theme-item" data-theme="lavender">
              <span class="theme-swatch swatch-lavender"></span><span>라벤더</span>
            </button>
            <button class="theme-item" data-theme="ocean">
              <span class="theme-swatch swatch-ocean"></span><span>오션</span>
            </button>
            <button class="theme-item" data-theme="cherry">
              <span class="theme-swatch swatch-cherry"></span><span>체리</span>
            </button>
            <button class="theme-item" data-theme="midnight">
              <span class="theme-swatch swatch-midnight"></span><span>미드나잇</span>
            </button>
          </div>
        </div>

        <div class="setting-section">
          <p class="setting-label">클리어 화면</p>
          <div class="option-pair">
            <button class="theme-item" data-clear-effect="confetti">
              <span class="theme-swatch swatch-clear-confetti">🎆</span><span>컨페티</span>
            </button>
            <button class="theme-item" data-clear-effect="minecraft">
              <span class="theme-swatch swatch-clear-minecraft">⛏️</span><span>마크 경험치</span>
            </button>
          </div>
        </div>

        <div class="setting-section">
          <p class="setting-label">게임 모드</p>
          <div class="option-pair">
            <button class="theme-item" data-deduction-mode="off">
              <span class="theme-swatch swatch-deduction-off">🍬</span><span>L 모드</span>
            </button>
            <button class="theme-item" data-deduction-mode="on">
              <span class="theme-swatch swatch-deduction-on">📓</span><span>라이토(추리)</span>
            </button>
          </div>
        </div>

        <button class="btn-close" type="button" id="closeSettings">닫기</button>
      </div>
    </div>
  </div>

  <!-- 출석체크 화면 -->
  <div id="attendanceView" class="view hidden">
    <div class="att-row">
      <button id="attendanceBack" class="back-btn">← 메뉴</button>
    </div>

    <div class="cal-frame">
      <div class="cal-header">
        <button id="calPrev" class="cal-nav" aria-label="이전 달">◀</button>
        <span id="calMonthLabel" class="cal-month-label">2026년 4월</span>
        <button id="calNext" class="cal-nav" aria-label="다음 달">▶</button>
      </div>
      <div id="calTrophyRow" class="cal-trophy-row"></div>
      <div id="calGrid" class="cal-grid"></div>
    </div>

    <button id="attendanceContinue" class="big-btn">계속하기 ▶</button>
  </div>

  <!-- 게임 화면 -->
  <div id="gameView" class="view hidden">
    <div class="game-stack">
      <button id="menuBack" class="back-btn">← 메뉴</button>

      <div id="stampBanner" class="stamp-banner hidden"></div>

      <div class="game-frame">
        <div class="status">
          <div class="led" id="mineCount">010</div>
          <button id="newGame" class="smiley" aria-label="새 게임">🙂</button>
          <div class="led" id="timer">000</div>
        </div>
        <div class="board-frame">
          <div id="board"></div>
        </div>
      </div>
    </div>
  </div>

  </div><!-- /scrollRoot -->

  <!-- 클리어 연출 오버레이 (전역) -->
  <canvas id="celebrationCanvas"></canvas>
  <div id="celebrationHalo"></div>
  <div id="celebrationLevelUp">+EXP</div>

  <script src="script.js?v=62"></script>
</body>
</html>
