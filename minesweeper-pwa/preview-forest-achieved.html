<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포레스트 — 트로피 달성</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 스크롤 풀기 */
    html, body {
      position: static !important; inset: auto !important;
      height: auto !important; min-height: 100vh !important;
      overflow: visible !important; overflow-y: auto !important;
    }
    body {
      background: #6a7050 !important;
      background-image: url('./bg-pattern-forest.svg') !important;
      background-size: 480px 480px !important;
      background-repeat: repeat !important;
      padding: 0 !important; margin: 0;
    }
    #scrollRoot {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px 12px 90px;
    }
    .demo-card {
      width: 100%; max-width: 360px;
      padding: 0;
      position: relative;
    }
    .demo-card .view {
      min-height: 0; padding: 0; gap: 10px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
    }
    .demo-card .cal-hint { display: none; }
    /* 메인 메뉴 버튼이랑 같은 높이/패딩 */
    .demo-card .back-btn { padding: 12px 14px; font-size: 0.95rem; min-height: 0; }
    .demo-card .big-btn { padding: 12px 14px; font-size: 1rem; }

    /* 포레스트 테마 색상 */
    .demo-forest .back-btn {
      background: #d4c094; color: #2e3818; border: none;
      border-radius: 3px;
      font-size: 0.85rem; padding: 8px 12px; min-height: 0; font-weight: 600;
    }
    .demo-forest .cal-frame { background: #f4ecd8; border: none; border-radius: 6px; }
    .demo-forest .cal-header { background: #7a8a64; color: #f8f0dc; border: none; }
    .demo-forest .cal-nav {
      background: #d4c094; color: #2e3818; border: none;
      border-radius: 3px;
      align-self: center;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .demo-forest .cal-grid {
      background: #8a9070; border: none;
      padding: 5px; gap: 4px;
    }
    .demo-forest .cal-day {
      background: #e4ebcc; border: none; border-radius: 4px;
      color: #2e3818; font-weight: 600;
    }
    .demo-forest .cal-day:hover { background: #ecf2d8; }
    .demo-forest .cal-day.stamp-pine,
    .demo-forest .cal-day.stamp-mushroom {
      color: transparent;
      background: #a8be88;
    }
    .demo-forest .cal-day.stamped::after { display: none; }
    .demo-forest .cal-day.stamp-pine::after,
    .demo-forest .cal-day.stamp-mushroom::after {
      content: ""; display: block; position: absolute;
      inset: 14%; border: none;
      background-position: center; background-repeat: no-repeat; background-size: contain;
      pointer-events: none;
    }
    .demo-forest .cal-day.stamp-pine::after {
      background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpolygon points='12,3 6,13 18,13' fill='%232a4220'/%3E%3Cpolygon points='12,8 4,18 20,18' fill='%231f3018'/%3E%3Crect x='10.5' y='18' width='3' height='3.5' fill='%235a3018'/%3E%3C/svg%3E");
    }
    .demo-forest .cal-day.stamp-mushroom::after {
      background-image: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M3.5 13 Q12 1.5 20.5 13 Z' fill='%23a0301c'/%3E%3Ccircle cx='8.5' cy='10.5' r='1.4' fill='%23fff5e0'/%3E%3Cellipse cx='14' cy='12.5' rx='1.2' ry='0.9' fill='%23fff5e0'/%3E%3Crect x='8.5' y='13' width='7' height='7' fill='%23f4e4c0'/%3E%3C/svg%3E");
    }
    .demo-forest .cal-wkhead {
      background: #f4ecd8; color: #4a5028;
      box-shadow: -2px 0 0 #f4ecd8, 2px 0 0 #f4ecd8;
      position: relative; z-index: 1;
    }
    .demo-forest .cal-wkhead::after {
      content: ""; position: absolute;
      top: 4px; bottom: 4px;
      right: -3px;
      width: 2.5px;
      background: rgba(74, 106, 32, 0.28);
      border-radius: 2px;
    }
    .demo-forest .cal-wkhead:last-of-type::after,
    .demo-forest .cal-wkhead.sat::after { display: none; }
    .demo-forest .cal-wkhead.sun { color: #b03220; }
    .demo-forest .cal-wkhead.sat { color: #4a6a20; }
    .demo-forest .big-btn {
      background: #d4c094; color: #2e3818; border: none;
      border-radius: 5px;
      font-size: 1rem; padding: 12px 16px; font-weight: 600;
    }

    /* ============ 달성된 트로피 영역 ============ */
    .demo-forest .cal-trophy-row.earned {
      position: relative;
      padding: 14px 12px 16px;
      background: linear-gradient(135deg, #f8efdc, #e4d4a4);
      color: #4a5028; border: none;
      min-height: 0;
      display: flex; flex-direction: column; align-items: center;
      overflow: hidden;
      animation: none;
      box-shadow: none;
    }
    /* ✨ 별: 제거 */
    .demo-forest .cal-trophy-row.earned::before { display: none !important; }
    .trophy-svg {
      width: 130px; height: 130px;
      cursor: pointer; user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease-out;
      filter: drop-shadow(0 2px 4px rgba(60, 40, 10, 0.35));
    }
    .trophy-svg.enlarged { transform: scale(1.3); }
    .trophy-caption {
      margin-top: 4px;
      font-family: "Times New Roman", Times, "Apple SD Gothic Neo", serif;
      font-size: 1.15rem; font-weight: 900;
      color: #4a3018;          /* "4월" 기본 브라운 */
      letter-spacing: 0.06em;
      text-align: center;
    }
    .trophy-caption .clear-text {
      color: #a87018;          /* "CLEAR!" 진한 골드 */
      text-shadow:
        1px 1px 0 rgba(255, 245, 200, 0.55),
        0 1px 2px rgba(120, 70, 0, 0.18);
    }
    .trophy-caption small {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #6a4a20;
      margin-top: 2px;
      text-transform: uppercase;
      font-weight: 600;
      font-family: inherit;
    }
  </style>
</head>
<body>
<div id="scrollRoot">

  <div class="demo-card demo-forest">
    <div class="view">
      <button class="back-btn">← 메뉴</button>
      <div class="cal-frame">
        <div class="cal-header">
          <button class="cal-nav">◀</button>
          <span class="cal-month-label">2026년 4월</span>
          <button class="cal-nav">▶</button>
        </div>
        <div class="cal-trophy-row earned" id="trophyRow">
          <!-- A1: 화려한 클래식 컵 (4월 트로피) — 모든 요소 가운데 x=55 정렬 -->
          <svg class="trophy-svg" viewBox="0 0 110 110" data-sound="dragon">
            <rect x="30" y="92" width="50" height="9" fill="#5a2810" rx="2"/>
            <rect x="34" y="84" width="42" height="9" fill="#7a3810" rx="1.5"/>
            <rect x="38" y="80" width="34" height="2" fill="#b07028"/>
            <rect x="48" y="68" width="14" height="14" fill="#d4a040"/>
            <ellipse cx="55" cy="68" rx="9" ry="2.5" fill="#a07820"/>
            <ellipse cx="55" cy="80" rx="10" ry="2.5" fill="#a07820"/>
            <path d="M 28 30 Q 10 36 10 50 Q 10 64 28 66" stroke="#8a5418" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M 28 30 Q 14 36 14 50 Q 14 64 28 66" stroke="#f4c840" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 82 30 Q 100 36 100 50 Q 100 64 82 66" stroke="#8a5418" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M 82 30 Q 96 36 96 50 Q 96 64 82 66" stroke="#f4c840" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 26 22 L 26 50 Q 26 70 55 70 Q 84 70 84 50 L 84 22 Z"
                  fill="#f4c840" stroke="#6a3818" stroke-width="2.4" stroke-linejoin="round"/>
            <line x1="30" y1="50" x2="80" y2="50" stroke="#a07820" stroke-width="1"/>
            <line x1="32" y1="56" x2="78" y2="56" stroke="#a07820" stroke-width="1"/>
            <polygon points="55,32 58,40 67,40 60,46 62,55 55,49 48,55 50,46 43,40 52,40"
                     fill="#b03228" stroke="#6a1808" stroke-width="1.2"/>
            <ellipse cx="55" cy="22" rx="29" ry="4.5" fill="#fce088" stroke="#6a3818" stroke-width="2"/>
            <ellipse cx="55" cy="22" rx="29" ry="2" fill="#fff5d0"/>
          </svg>
          <div class="trophy-caption">4월 <span class="clear-text">CLEAR!</span><small>April 2026</small></div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
      <button class="big-btn">계속하기 ▶</button>
    </div>
  </div>

</div>

<script>
  // 30일 다 클리어된 상태
  const FIRST_DOW = 3, LAST = 30;

  const grid = document.getElementById("calGrid");
  const wks = ["일","월","화","수","목","금","토"];
  wks.forEach((n, i) => {
    const h = document.createElement("div");
    h.className = "cal-wkhead" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
    h.textContent = n;
    grid.appendChild(h);
  });
  for (let i = 0; i < FIRST_DOW; i++) {
    const b = document.createElement("div");
    b.className = "cal-blank";
    grid.appendChild(b);
  }
  for (let d = 1; d <= LAST; d++) {
    const c = document.createElement("button");
    c.className = "cal-day stamped";
    c.type = "button";
    c.textContent = d;
    c.classList.add((d - 1) % 2 === 0 ? "stamp-pine" : "stamp-mushroom");
    grid.appendChild(c);
  }

  // 트로피 클릭: 20% 확률로 랜덤 웃음, 단 직전이 웃음이면 무조건 동물
  const LAUGH_FILES = ["sitcom", "crazy", "sinister", "evil"];
  const LAUGH_CHANCE = 0.2;
  let lastWasLaugh = false;

  const trophy = document.querySelector(".trophy-svg");
  let timer;
  const onTap = (e) => {
    e.preventDefault();
    trophy.classList.add("enlarged");
    let path;
    if (!lastWasLaugh && Math.random() < LAUGH_CHANCE) {
      lastWasLaugh = true;
      const name = LAUGH_FILES[Math.floor(Math.random() * LAUGH_FILES.length)];
      path = `./sounds/laugh/${name}.mp3`;
    } else {
      lastWasLaugh = false;
      path = `./sounds/${trophy.dataset.sound}.mp3`;  // 4월 = dragon
    }
    const a = new Audio(path);
    a.play().catch(() => {});
    a.onended = () => trophy.classList.remove("enlarged");
    clearTimeout(timer);
    timer = setTimeout(() => trophy.classList.remove("enlarged"), 6000);
  };
  trophy.addEventListener("click", onTap);
  trophy.addEventListener("touchstart", onTap, { passive: false });
</script>
</body>
</html>
